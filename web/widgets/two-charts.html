<!-- ═══ Interactive: Two intersecting charts on a manifold ═══ -->
<div class="interactive-figure" id="tc-widget">
<div class="fig-header">Interactive: Two intersecting charts on a manifold</div>
<canvas id="tc-canvas" style="width:100%;aspect-ratio:2.4/1;display:block;cursor:grab;background:white;touch-action:none"></canvas>
<div class="fig-controls" style="padding:0.6em 1em;background:#fafafa;border-top:1px solid #eee;font-size:0.82em;display:flex;flex-wrap:wrap;gap:0.5em 1.4em;align-items:center;font-variant-numeric:tabular-nums">
  <span>Drag the gold point <strong>p</strong> around ℳ.</span>
  <span>p = <span id="tc-p-xy">(0.10, 0.00)</span></span>
  <span class="tc-tag" id="tc-tag-alpha" style="padding:1px 7px;border-radius:4px;font-size:0.92em"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#4A7FB5;vertical-align:middle;margin-right:4px"></span>O<sub>α</sub></span>
  <span class="tc-tag" id="tc-tag-beta"  style="padding:1px 7px;border-radius:4px;font-size:0.92em"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#5B8C6F;vertical-align:middle;margin-right:4px"></span>O<sub>β</sub></span>
  <span class="tc-tag" id="tc-tag-both"  style="padding:1px 7px;border-radius:4px;font-size:0.92em"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#C4392F;vertical-align:middle;margin-right:4px"></span>O<sub>α</sub>∩O<sub>β</sub></span>
  <a href="two-charts.html" style="margin-left:auto;font-size:0.9em;color:var(--munsell)">Open full page →</a>
</div>
</div>
<style>
#tc-widget .tc-tag.in  { background: rgba(61,122,85,0.15); color: #355E42; }
#tc-widget .tc-tag.out { background: #f0f0f0; color: #999; }
#tc-widget canvas.grabbing { cursor: grabbing; }
</style>
<script>
(function(){
  const cv = document.getElementById('tc-canvas');
  if (!cv) return;
  const cx = cv.getContext('2d');

  // Geometry — mirrors the lec03 PDF figure (α, β, θ_β).
  const α  = { cx:-0.30, cy: 0.15, a: 1.10, b: 0.75, phi:  0.35 };
  const β  = { cx: 0.55, cy:-0.20, a: 1.10, b: 0.75, phi: -0.30 };
  const θβ = Math.PI / 6;
  const DOM = { xmin:-2.6, xmax:2.6, ymin:-1.8, ymax:1.8 };
  const CHART_RANGE = 2.8;

  let p = { x: 0.10, y: 0.00 };
  let dragging = false;

  function inEllipse(pt, e) {
    const c = Math.cos(e.phi), s = Math.sin(e.phi);
    const dx = pt.x - e.cx, dy = pt.y - e.cy;
    const u =  dx*c + dy*s;
    const v = -dx*s + dy*c;
    return (u*u)/(e.a*e.a) + (v*v)/(e.b*e.b) < 1;
  }
  function ψα(pt) { return { x: pt.x - α.cx, y: pt.y - α.cy }; }
  function ψβ(pt) {
    const dx = pt.x - β.cx, dy = pt.y - β.cy;
    const c = Math.cos(θβ), s = Math.sin(θβ);
    return { x: c*dx - s*dy, y: s*dx + c*dy };
  }
  const Uα = { cx:0, cy:0, a:α.a, b:α.b, phi:α.phi };
  const Uβ = { cx:0, cy:0, a:β.a, b:β.b, phi:β.phi + θβ };

  function setup() {
    const dpr = window.devicePixelRatio || 1;
    const r = cv.getBoundingClientRect();
    cv.width  = Math.round(r.width * dpr);
    cv.height = Math.round(r.height * dpr);
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { w: r.width, h: r.height };
  }
  function layout(w, h) {
    const gap = 8;
    const mw = Math.round(w * 0.52);
    const cw = Math.round((w - mw - 2*gap) / 2);
    return {
      M:  { x: 0,                  y: 0, w: mw, h: h },
      Uα: { x: mw + gap,           y: 0, w: cw, h: h },
      Uβ: { x: mw + gap + cw + gap, y: 0, w: cw, h: h },
    };
  }
  function m2px(pt, panel) {
    const xr = DOM.xmax - DOM.xmin, yr = DOM.ymax - DOM.ymin;
    return [ panel.x + (pt.x - DOM.xmin) / xr * panel.w,
             panel.y + (DOM.ymax - pt.y) / yr * panel.h ];
  }
  function c2px(pt, panel) {
    const side = Math.min(panel.w, panel.h);
    const cxp = panel.x + panel.w/2, cyp = panel.y + panel.h/2;
    const s = side / CHART_RANGE;
    return [ cxp + pt.x * s, cyp - pt.y * s ];
  }
  function px2m(px, py, panel) {
    const xr = DOM.xmax - DOM.xmin, yr = DOM.ymax - DOM.ymin;
    return {
      x: DOM.xmin + (px - panel.x) / panel.w * xr,
      y: DOM.ymax - (py - panel.y) / panel.h * yr,
    };
  }
  function fillEllipseM(e, panel, fill) {
    const N = 96; cx.beginPath();
    for (let i = 0; i <= N; i++) {
      const t = i/N * 2*Math.PI;
      const xa = e.a*Math.cos(t), ya = e.b*Math.sin(t);
      const c = Math.cos(e.phi), s = Math.sin(e.phi);
      const wx = e.cx + xa*c - ya*s, wy = e.cy + xa*s + ya*c;
      const [ux, uy] = m2px({x:wx, y:wy}, panel);
      if (i === 0) cx.moveTo(ux, uy); else cx.lineTo(ux, uy);
    }
    cx.closePath(); cx.fillStyle = fill; cx.fill();
  }
  function fillEllipseChart(e, panel, fill) {
    const N = 96; cx.beginPath();
    for (let i = 0; i <= N; i++) {
      const t = i/N * 2*Math.PI;
      const xa = e.a*Math.cos(t), ya = e.b*Math.sin(t);
      const c = Math.cos(e.phi), s = Math.sin(e.phi);
      const wx = e.cx + xa*c - ya*s, wy = e.cy + xa*s + ya*c;
      const [ux, uy] = c2px({x:wx, y:wy}, panel);
      if (i === 0) cx.moveTo(ux, uy); else cx.lineTo(ux, uy);
    }
    cx.closePath(); cx.fillStyle = fill; cx.fill();
  }
  function fillIntersectionM(panel, fill) {
    const step = 2; cx.fillStyle = fill;
    for (let py = panel.y; py < panel.y + panel.h; py += step) {
      for (let px = panel.x; px < panel.x + panel.w; px += step) {
        const m = px2m(px + step/2, py + step/2, panel);
        if (inEllipse(m, α) && inEllipse(m, β)) cx.fillRect(px, py, step, step);
      }
    }
  }
  function drawPoint(pt, panel, colour, radius, mode) {
    const [ux, uy] = mode === 'M' ? m2px(pt, panel) : c2px(pt, panel);
    cx.fillStyle = colour; cx.strokeStyle = 'white'; cx.lineWidth = 2;
    cx.beginPath(); cx.arc(ux, uy, radius, 0, 2*Math.PI); cx.fill(); cx.stroke();
  }
  function drawPanelFrame(panel, label, colour) {
    cx.strokeStyle = '#e4e4e4'; cx.lineWidth = 1;
    cx.strokeRect(panel.x+0.5, panel.y+0.5, panel.w-1, panel.h-1);
    cx.fillStyle = colour; cx.font = '600 12px system-ui, sans-serif';
    cx.textBaseline = 'top';
    cx.fillText(label, panel.x + 8, panel.y + 6);
  }
  function drawChartAxes(panel) {
    const [cxp, cyp] = c2px({x:0,y:0}, panel);
    const side = Math.min(panel.w, panel.h);
    cx.strokeStyle = 'rgba(217,122,43,0.35)'; cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(panel.x + panel.w/2 - side/2 + 14, cyp);
    cx.lineTo(panel.x + panel.w/2 + side/2 - 14, cyp);
    cx.moveTo(cxp, panel.y + panel.h/2 - side/2 + 14);
    cx.lineTo(cxp, panel.y + panel.h/2 + side/2 - 14);
    cx.stroke();
  }
  function drawLabel(text, x, y, colour, font, align) {
    cx.fillStyle = colour; cx.font = font || '12px system-ui, sans-serif';
    cx.textAlign = align || 'left'; cx.textBaseline = 'middle';
    cx.fillText(text, x, y); cx.textAlign = 'start';
  }

  function render() {
    const { w, h } = setup();
    const L = layout(w, h);
    cx.clearRect(0, 0, w, h);

    // M panel
    cx.fillStyle = '#f7fbf9'; cx.fillRect(L.M.x, L.M.y, L.M.w, L.M.h);
    cx.strokeStyle = 'rgba(0,0,0,0.05)'; cx.lineWidth = 1;
    for (let xv = Math.ceil(DOM.xmin); xv <= DOM.xmax; xv++) {
      const [px,] = m2px({x:xv, y:0}, L.M);
      cx.beginPath(); cx.moveTo(px, L.M.y); cx.lineTo(px, L.M.y + L.M.h); cx.stroke();
    }
    for (let yv = Math.ceil(DOM.ymin); yv <= DOM.ymax; yv++) {
      const [,py] = m2px({x:0, y:yv}, L.M);
      cx.beginPath(); cx.moveTo(L.M.x, py); cx.lineTo(L.M.x + L.M.w, py); cx.stroke();
    }
    fillEllipseM(α, L.M, 'rgba(74,127,181,0.25)');
    fillEllipseM(β, L.M, 'rgba(91,140,111,0.30)');
    fillIntersectionM(L.M, 'rgba(196,57,47,0.55)');

    drawPanelFrame(L.M,  'ℳ  (the manifold)', '#3D7A55');
    drawLabel('O_α',        L.M.x +  84, L.M.y + 52, '#2c4c77', 'italic 13px Georgia, serif');
    drawLabel('O_β',        L.M.x + L.M.w - 96, L.M.y + L.M.h - 48, '#365a46', 'italic 13px Georgia, serif');
    drawLabel('O_α ∩ O_β',  L.M.x + L.M.w/2 - 10, L.M.y + L.M.h/2 + 42, '#8a1e15', 'italic 12px Georgia, serif', 'center');

    // U_α panel
    cx.fillStyle = '#fcfcfc'; cx.fillRect(L.Uα.x, L.Uα.y, L.Uα.w, L.Uα.h);
    drawChartAxes(L.Uα);
    fillEllipseChart(Uα, L.Uα, 'rgba(74,127,181,0.22)');
    drawPanelFrame(L.Uα, 'U_α ⊂ ℝ²', '#2c4c77');
    drawLabel('ψ_α', L.Uα.x + L.Uα.w/2, L.Uα.y + 26, '#2c4c77',
              '600 11px system-ui, sans-serif', 'center');

    // U_β panel
    cx.fillStyle = '#fcfcfc'; cx.fillRect(L.Uβ.x, L.Uβ.y, L.Uβ.w, L.Uβ.h);
    drawChartAxes(L.Uβ);
    fillEllipseChart(Uβ, L.Uβ, 'rgba(91,140,111,0.25)');
    drawPanelFrame(L.Uβ, 'U_β ⊂ ℝ²', '#365a46');
    drawLabel('ψ_β', L.Uβ.x + L.Uβ.w/2, L.Uβ.y + 26, '#365a46',
              '600 11px system-ui, sans-serif', 'center');

    // Point p
    drawPoint(p, L.M, '#E8B630', 7, 'M');
    const [ppx, ppy] = m2px(p, L.M);
    drawLabel('p', ppx + 10, ppy - 10, '#8a7a00', '700 13px Georgia, serif');

    const inα = inEllipse(p, α);
    const inβ = inEllipse(p, β);
    if (inα) {
      drawPoint(ψα(p), L.Uα, '#E8B630', 6, 'chart');
      const [qx, qy] = c2px(ψα(p), L.Uα);
      drawLabel('ψ_α(p)', qx + 9, qy - 10, '#8a7a00', '600 11px Georgia, serif');
    } else {
      drawLabel('p ∉ O_α', L.Uα.x + L.Uα.w/2, L.Uα.y + L.Uα.h - 16,
                '#aaa', 'italic 11px Georgia, serif', 'center');
    }
    if (inβ) {
      drawPoint(ψβ(p), L.Uβ, '#E8B630', 6, 'chart');
      const [qx, qy] = c2px(ψβ(p), L.Uβ);
      drawLabel('ψ_β(p)', qx + 9, qy - 10, '#8a7a00', '600 11px Georgia, serif');
    } else {
      drawLabel('p ∉ O_β', L.Uβ.x + L.Uβ.w/2, L.Uβ.y + L.Uβ.h - 16,
                '#aaa', 'italic 11px Georgia, serif', 'center');
    }

    const pxyEl = document.getElementById('tc-p-xy');
    if (pxyEl) pxyEl.textContent = `(${p.x.toFixed(2)}, ${p.y.toFixed(2)})`;
    const tα = document.getElementById('tc-tag-alpha');
    const tβ = document.getElementById('tc-tag-beta');
    const tab = document.getElementById('tc-tag-both');
    if (tα)  tα.className  = 'tc-tag ' + (inα ? 'in' : 'out');
    if (tβ)  tβ.className  = 'tc-tag ' + (inβ ? 'in' : 'out');
    if (tab) tab.className = 'tc-tag ' + ((inα && inβ) ? 'in' : 'out');
  }

  function eventToM(ev) {
    const r = cv.getBoundingClientRect();
    const px = ev.clientX - r.left, py = ev.clientY - r.top;
    const L = layout(r.width, r.height);
    if (px < L.M.x || px > L.M.x + L.M.w) return null;
    return px2m(px, py, L.M);
  }
  function clampToM(pt) {
    const pad = 0.05;
    return {
      x: Math.max(DOM.xmin+pad, Math.min(DOM.xmax-pad, pt.x)),
      y: Math.max(DOM.ymin+pad, Math.min(DOM.ymax-pad, pt.y)),
    };
  }
  cv.addEventListener('pointerdown', ev => {
    const m = eventToM(ev); if (!m) return;
    dragging = true; cv.classList.add('grabbing');
    p = clampToM(m); render(); ev.preventDefault();
  });
  window.addEventListener('pointermove', ev => {
    if (!dragging) return;
    const m = eventToM(ev); if (!m) return;
    p = clampToM(m); render();
  });
  window.addEventListener('pointerup', () => {
    dragging = false; cv.classList.remove('grabbing');
  });
  window.addEventListener('resize', render);

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    requestAnimationFrame(render);
  }
})();
</script>
<!-- ═══ End interactive ═══ -->
